<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My startup project">
    <title>My Startup</title>
    <script src="https://kit.fontawesome.com/464cbda17d.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="//embed.typeform.com/next/embed.js"></script>
  </head>
  <body>

    <div class="banner">
      <div class="container">
        <h1>Change your life,<br>learn to code</h1>
        <h2>We bring tech skills to creative people.</h2>
        <button data-tf-popup="vSdOHokh" class="btn-primary">Apply now</button>
      </div>
    </div>

    <div class="container">
      <h2 class="section-title">Our cities</h2>
      <div class="cards">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1538428494232-9c0d8a3ab403?w=300" alt="Shanghai">
          <h3>Shanghai</h3>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=300" alt="Paris">
          <h3>Paris</h3>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=300" alt="Rio">
          <h3>Rio</h3>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1573790387438-4da905039392?w=300" alt="Bali">
          <h3>Bali</h3>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=300" alt="Tokyo">
          <h3>Tokyo</h3>
        </div>
      </div>
    </div>

    <div class="avatar-section">
      <div class="container">
        <h2 class="section-title">About me</h2>
        <img src="images/avatar.jpg" alt="Avatar" class="avatar">
      </div>
    </div>

  </body>
</html>
